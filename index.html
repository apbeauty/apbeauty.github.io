<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP BEAUTY — Brand Guidelines</title>
    <meta name="description" content="AP BEAUTY의 브랜드 아이덴티티 핵심 시각 자산 및 디자인 가이드라인 웹 매뉴얼입니다.">
    
    <!-- Google Fonts: Outfit (Futura alternative) & Noto Sans KR / SC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&family=Noto+Sans:wght@100;200;300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@100;300;400;500;700;900&family=Noto+Sans+SC:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Adobe Fonts: Futura -->
    <link rel="stylesheet" href="https://use.typekit.net/eua0dfs.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css?v=13.2">
</head>
<body class="light-theme">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="app-sidebar">
            <div class="sidebar-header" style="text-align: left; display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 24px;">
                <div class="brand-logo" style="display: flex; justify-content: flex-start; width: 100%;">
                    <img id="brand-logo-img" src="assets/core_wordmark_b.svg" alt="AP BEAUTY" style="max-width: 92.4%; height: auto; display: block;">
                </div>
            </div>

            <nav class="nav-menu" id="nav-links">
                <!-- Navigation links will be dynamically populated here -->
            </nav>

            <!-- Sidebar Footer Controls -->
            <div class="sidebar-controls">
                <div class="search-and-lang-row">
                    <!-- Search Bar -->
                    <div class="search-bar-container">
                        <input type="text" id="sidebar-search-input" class="search-bar-input" placeholder="SEARCH">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="10" cy="10" r="6.5"></circle>
                            <line x1="21" y1="21" x2="14.6" y2="14.6"></line>
                        </svg>
                        <button id="search-clear-btn" class="search-clear-btn" title="검색 지우기">✕</button>
                    </div>
                    <!-- Language Toggle Button -->
                    <button id="lang-toggle-btn" class="btn-lang btn-lang-square">KR</button>
                </div>
            </div>
        </aside>
        
        <!-- Sidebar overlay for mobile drawer -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Mobile Header Bar -->
            <header class="content-header">
                <div class="mobile-header-inner">
                    <!-- Left: Logo -->
                    <div class="mobile-logo" id="mobile-logo-btn">
                        <img src="assets/core_wordmark_b.svg" alt="AP BEAUTY" style="height: 18px; width: auto; display: block;">
                    </div>
                    
                    <!-- Right: Search toggle, Language toggle & Hamburger menu -->
                    <div class="mobile-actions">
                        <!-- Header Search Box (hidden by default) -->
                        <div class="header-search-container" id="header-search-box">
                            <input type="text" id="header-search-input" class="header-search-input" placeholder="SEARCH">
                            <button id="header-search-close" class="header-search-close-btn">✕</button>
                        </div>
                        
                        <button id="header-lang-toggle-btn" class="header-action-btn btn-lang-square" title="언어 변경">KR</button>
                        
                        <button id="header-search-toggle" class="header-action-btn" title="검색">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="10.5" cy="10.5" r="6.5"></circle>
                                <line x1="21" y1="21" x2="15.1" y2="15.1"></line>
                            </svg>
                        </button>
                        
                        <button id="menu-toggle-btn" class="header-action-btn hamburger-btn" title="메뉴">
                            <span></span>
                            <span></span>
                            <span></span>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Mobile Slide-Down Dropdown Menu -->
            <div class="mobile-menu-dropdown" id="mobile-menu-dropdown">
                <nav class="mobile-menu-nav" id="mobile-menu-nav">
                    <!-- Dynamic links will be populated here -->
                </nav>
            </div>

            <!-- Page Title -->
            <div class="main-page-title-container">
                <h1 class="main-page-title">BRAND GUIDELINE</h1>
            </div>

            <!-- Guidelines Sections Container -->
            <div class="sections-container" id="sections-wrapper">
                <!-- Sections will be rendered here dynamically -->
                <div class="loader-container">
                    <div class="spinner"></div>
                    <p>브랜드 가이드라인 불러오는 중...</p>
                </div>
            </div>

            <!-- Footer -->
            <footer class="content-footer" style="border-top: none; padding-top: 16px; margin-top: 24px;">
            </footer>
        </main>
    </div>

    <!-- Custom Toast Notification -->
    <div class="toast-container" id="toast-wrapper"></div>

    <!-- App Logic -->
    <script src="data.js?v=13.2"></script>
    <script src="app.js?v=13.2"></script>
</body>
</html>
